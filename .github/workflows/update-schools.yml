name: Update Miami public schools CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"
  push:
    branches: [main]
    paths:
      - "scripts/update_schools.py"
      - ".github/workflows/update-schools.yml"

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate schools.csv
        run: python scripts/update_schools.py

      - name: Commit updated CSV
        run: |
          if git diff --quiet -- schools.csv; then
            echo "schools.csv is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schools.csv
          git commit -m "Update Miami public schools CSV"
          git push
